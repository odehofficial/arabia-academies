<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 220" role="img" aria-label="ENE X eCom">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&amp;display=swap');
    .w1  { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 58px; fill: #F4EFE2; }
    .w2  { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 58px; fill: #8A7DF5; }
    .tag { font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 22px; fill: #8A7DF5; letter-spacing: 2px; }
  </style>

  <!-- Mark: violet circle, lead funnel + spark -->
  <g transform="translate(110,110)">
