    </g>
    <circle cx="44" cy="40" r="14" fill="#1B1440"/>
    <circle cx="44" cy="40" r="24" fill="none" stroke="#1B1440" stroke-width="7" opacity=".55"/>
  </g>

  <!-- Wordmark -->
  <text x="238" y="112" class="w1">ENE <tspan class="w2">X eCom</tspan></text>
  <text x="242" y="164" class="tag">High-value leads with Meta Ads</text>
</svg>
