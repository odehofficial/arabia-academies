<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 220" role="img" aria-label="eCom Arabia — Road to success">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&amp;display=swap');
    .w1  { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 62px; fill: #F4EFE2; }
    .w2  { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 62px; fill: #2E9AD6; }
    .tag { font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 22px; fill: #2E9AD6; letter-spacing: 2px; }
  </style>
  <defs>
    <marker id="ah2" viewBox="0 0 10 10" refX="6.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#FFFFFF"/>
    </marker>
  </defs>

  <!-- Mark: blue circle, rising bars, growth arrow -->
  <g transform="translate(110,110)">
    <circle r="92" fill="#2E9AD6"/>
    <g fill="#FFFFFF">
      <rect x="-58" y="10"  width="22" height="44" rx="4"/>
      <rect x="-28" y="-6"  width="22" height="60" rx="4"/>
      <rect x="2"   y="-22" width="22" height="76" rx="4"/>
      <rect x="32"  y="-38" width="22" height="92" rx="4"/>
    </g>
    <path d="M-62,-16 C -34,-20 -16,-38 6,-52 L 40,-70" fill="none" stroke="#FFFFFF"
          stroke-width="10" stroke-linecap="round" marker-end="url(#ah2)"/>
  </g>

  <!-- Wordmark -->
  <text x="238" y="118" class="w1">eCom <tspan class="w2">Arabia</tspan></text>
  <text x="242" y="168" class="tag">Road to success</text>
</svg>
