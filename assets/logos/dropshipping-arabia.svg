<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 220" role="img" aria-label="Dropshipping Arabia">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&amp;display=swap');
    .w1  { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 54px; fill: #F4EFE2; }
    .w2  { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 54px; fill: #37C6A0; }
    .tag { font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 22px; fill: #37C6A0; letter-spacing: 2px; }
  </style>

  <!-- Mark: teal circle, parcel in motion (COD dropshipping) -->
  <g transform="translate(110,110)">
    <circle r="92" fill="#37C6A0"/>
    <!-- speed lines -->
    <g stroke="#0B3F32" stroke-width="10" stroke-linecap="round" opacity=".55">
      <path d="M-72,-10 L-34,-10"/>
      <path d="M-64,14 L-30,14"/>
      <path d="M-56,38 L-26,38"/>
    </g>
    <!-- parcel -->
    <g transform="translate(18,6) rotate(-8)">
      <rect x="-38" y="-38" width="80" height="76" rx="10" fill="#FFFFFF"/>
      <path d="M-38,-12 L42,-12" stroke="#37C6A0" stroke-width="7"/>
      <path d="M2,-38 L2,-12" stroke="#37C6A0" stroke-width="7"/>
      <path d="M2,-64 L2,-92 M2,-92 L-14,-76 M2,-92 L18,-76" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" fill="none"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="238" y="112" class="w1">Dropshipping <tspan class="w2">Arabia</tspan></text>
  <text x="242" y="164" class="tag">Road to success</text>
</svg>
