<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Iraq e-Com — growth bars in flag colors, transparent background -->
  <g>
    <!-- base -->
    <rect x="14" y="164" width="172" height="17" rx="8.5" fill="#5C6B77"/>
    <!-- bars -->
    <rect x="26"  y="100" width="30" height="60" rx="7" fill="#FA3E3E"/>
    <rect x="66"  y="66"  width="30" height="94" rx="7" fill="#EFEFEF"/>
    <rect x="106" y="82"  width="30" height="78" rx="7" fill="#2E6B27"/>
    <rect x="146" y="44"  width="30" height="116" rx="7" fill="#0C0C0C"/>
    <!-- trend line -->
    <path d="M41 80 L81 42 L121 62 L163 24" fill="none" stroke="#5C6B77" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- arrow head -->
    <path d="M148 22 L166 21 L167 39" fill="none" stroke="#0C0C0C" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- nodes -->
    <circle cx="41"  cy="80" r="12" fill="#FA3E3E"/>
    <circle cx="81"  cy="42" r="12" fill="#EFEFEF"/>
    <circle cx="121" cy="62" r="12" fill="#2E6B27"/>
  </g>
</svg>
